  <meta name="theme-color" content="#edeae4" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#080c17"  media="(prefers-color-scheme: dark)">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:     #fc7a00;
      --orange-bg:  rgba(252,122,0,0.08);
      --font-mono:  'Ubuntu Mono', 'Courier New', monospace;
      --font-disp:  'Righteous', cursive;
      --ease:       cubic-bezier(.4,0,.2,1);
      --transition: 0.32s var(--ease);
    }

    [data-theme="dark"] {
      --bg:          #080c17;
      --vignette:    rgba(8,12,23,0.72);
      --card-bg:     rgba(12,18,32,0.74);
      --card-border: rgba(252,122,0,0.17);
      --card-shadow: 0 28px 64px rgba(0,0,0,0.58);
      --text:        #dde0ea;
      --muted:       #6e7a96;
      --subtle:      #4a5268;
      --link-border: rgba(255,255,255,0.08);
      --badge-bg:    rgba(30,200,80,0.11);
      --badge-text:  #4ade80;
      --badge-dot:   #4ade80;
    }

    [data-theme="light"] {
      --bg:          #edeae4;
      --vignette:    rgba(190,180,165,0.42);
      --card-bg:     rgba(255,253,249,0.88);
      --card-border: rgba(252,122,0,0.24);
      --card-shadow: 0 16px 48px rgba(50,32,8,0.13);
      --text:        #1e1a14;
      --muted:       #74664f;
      --subtle:      #a8977e;
      --link-border: rgba(0,0,0,0.09);
      --badge-bg:    rgba(22,163,74,0.09);
      --badge-text:  #15803d;
      --badge-dot:   #16a34a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      overflow: hidden;
      transition: background var(--transition), color var(--transition);
    }

    /* ── Particles ───────────────────────────────────────── */
    #particles-js { position: fixed; inset: 0; z-index: 0; }

    .vignette {
      pointer-events: none; position: fixed; inset: 0; z-index: 5;
      background: radial-gradient(ellipse at center, transparent 42%, var(--vignette) 100%);
      transition: background var(--transition);
    }

    /* ── Controls ────────────────────────────────────────── */
    .controls {
      position: fixed; top: 1rem; right: 1.25rem; z-index: 20;
      display: flex; align-items: center; gap: .4rem;
    }

    .ctrl-btn {
      display: flex; align-items: center; gap: .28rem;
      padding: .28rem .62rem; border-radius: 20px;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      color: var(--muted); font-family: var(--font-mono);
      font-size: .69rem; letter-spacing: .06em; text-transform: uppercase;
      cursor: pointer; user-select: none;
      transition: color .2s, border-color .2s, background .2s;
    }
    .ctrl-btn:hover { color: var(--orange); border-color: rgba(252,122,0,0.42); }
    .ctrl-btn i { font-size: .72rem; }

    /* ── Stage ───────────────────────────────────────────── */
    .stage {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
    }

    /* ── Card ────────────────────────────────────────────── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 22px;
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      padding: 2.5rem 2.75rem;
      max-width: 660px; width: 100%;
      display: flex; align-items: center; gap: 2.5rem;
      box-shadow: var(--card-shadow), inset 0 1px 0 rgba(255,255,255,0.06);
      transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
      opacity: 0; transform: translateY(20px);
      animation: fadeUp 0.6s cubic-bezier(.22,.68,0,1.1) 0.28s forwards;
    }
    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

    /* ── Avatar ──────────────────────────────────────────── */
    .avatar-wrap { flex-shrink: 0; position: relative; }

    .avatar-wrap::before {
      content: ''; position: absolute; inset: -4px; border-radius: 50%;
      background: conic-gradient(
        var(--orange) 0deg, transparent 75deg,
        transparent 195deg, var(--orange) 285deg, var(--orange) 360deg
      );
      animation: spin 7s linear infinite; z-index: -1;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-wrap::after {
      content: ''; position: absolute; inset: -2px; border-radius: 50%;
      background: var(--bg); transition: background var(--transition);
    }

    .avatar {
      position: relative; z-index: 1;
      width: 116px; height: 116px;
      border-radius: 50%; object-fit: cover; display: block;
    }

    /* ── Info ────────────────────────────────────────────── */
    .info { flex: 1; min-width: 0; }

    /* Handle — display font, hero size */
    .handle {
      font-family: var(--font-disp);
      font-size: clamp(1.45rem, 3.6vw, 1.9rem);
      color: var(--orange);
      letter-spacing: .025em; line-height: 1;
      margin-bottom: .4rem;
    }
    
    .fullname {
      font-size: 1.45rem;          /* fixed, not clamp — names shouldn't shrink oddly */
      font-weight: 700;
      color: var(--text);
      letter-spacing: .01em;
      margin-bottom: .4rem;
      transition: color var(--transition);
    }

    /* Role typewriter — muted, clearly secondary */
    .role {
      font-size: 1rem;
      color: var(--muted);
      min-height: 1.4em;
      transition: color var(--transition);
    }

    .cursor {
      display: inline-block; width: 2px; height: .85em;
      background: var(--orange); vertical-align: text-bottom;
      margin-left: 1px; animation: blink .85s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Meta row — location · email on ONE line ─────────── */
    .meta {
      display: flex; align-items: center; gap: .75rem;
      margin-top: .6rem; flex-wrap: wrap;
    }

    .meta-info {
      display: flex; align-items: center; gap: .28rem;
      font-size: .74rem; color: var(--muted);
      transition: color var(--transition);
      white-space: nowrap;
    }
    .meta-info i { font-size: .7rem; opacity: .75; }

    .meta-sep {
      color: var(--subtle); font-size: .74rem;
      opacity: .6; user-select: none;
    }

    /* location + email in single flex row */
    .meta-line {
      display: flex; align-items: center; gap: .45rem; flex-wrap: wrap;
    }

    .badge {
      display: flex; align-items: center; gap: .32rem;
      font-size: .69rem; padding: .18rem .5rem;
      border-radius: 20px;
      background: var(--badge-bg); color: var(--badge-text);
      border: 1px solid color-mix(in srgb, var(--badge-text) 28%, transparent);
      white-space: nowrap;
      transition: background var(--transition), color var(--transition);
    }
    .badge-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--badge-dot);
      animation: pulse 2.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.45; transform:scale(.7); }
    }

    /* ── Divider ─────────────────────────────────────────── */
    .divider {
      margin: 1.05rem 0; height: 1px;
      background: linear-gradient(90deg, var(--orange) 0%, transparent 100%);
      opacity: .25;
    }

    /* ── Bio — comfortable reading size ──────────────────── */
    .bio {
      font-size: .86rem;       /* up from .82 — easier on eyes */
      color: var(--muted);
      line-height: 1.6;        /* generous leading */
      margin-bottom: 1.1rem;
      transition: color var(--transition);
    }

    /* ── Social icon links ───────────────────────────────── */
    .links { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }

    .link {
      color: var(--muted); font-size: 1.15rem;
      width: 38px; height: 38px;              /* slightly larger hit target */
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--link-border); border-radius: 9px;
      text-decoration: none;
      transition: color .2s, border-color .2s, transform .18s, background .2s;
    }
    .link:hover {
      color: var(--orange);
      border-color: rgba(252,122,0,0.48);
      background: var(--orange-bg);
      transform: translateY(-2px);
    }

    /* ── CV button ───────────────────────────────────────── */
    .cv-btn {
      display: inline-flex; align-items: center; gap: .38rem;
      margin-top: .85rem;
      padding: .4rem .95rem; border-radius: 8px;
      border: 1px solid rgba(252,122,0,0.42);
      background: var(--orange-bg);
      color: var(--orange); font-family: var(--font-mono);
      font-size: .76rem; letter-spacing: .04em;
      text-decoration: none; cursor: pointer;
      transition: background .2s, border-color .2s, transform .18s;
    }
    .cv-btn:hover { background: rgba(252,122,0,0.14); transform: translateY(-1px); }
    .cv-btn i { font-size: .76rem; }
    .cv-btn.hidden { display: none; }

    /* ── Mobile ──────────────────────────────────────────── */
    @media (max-width: 580px) {
      body { overflow: auto; }
      html, body { height: auto; }
      .stage { position: relative; min-height: 100svh; padding-top: 4.5rem; }
      .card {
        flex-direction: column; text-align: center;
        padding: 2rem 1.5rem; gap: 1.25rem;
      }
      .avatar { width: 94px; height: 94px; }
      .divider { background: linear-gradient(90deg, transparent, var(--orange), transparent); }
      .meta, .meta-line, .links { justify-content: center; }
      /* on tiny screens show only the icon for email — text wraps badly */
      .meta-email-text { display: none; }
    }
  </style>
</head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>

  <script>
    /* ── i18n ────────────────────────────────────────────── */
    const i18n = {
      en: {
        roles:     ['Offensive Cybersecurity Consultant', 'Penetration Tester', 'AI Red Teamer', 'Bug Bounty Hunter'],
        location:  'Indonesia',
        available: 'Available',
        bio:       'Impossible is nothing.',
        cv:        '<i class="fas fa-file-arrow-down"></i> Download CV',
        darkLbl:   'Dark', lightLbl: 'Light',
      },
      id: {
        roles:     ['Offensive Cybersecurity Consultant', 'Penetration Tester', 'AI Red Teamer', 'Bug Bounty Hunter'],
        location:  'Indonesia',
        available: 'Tersedia',
        bio:       'Impossible is nothing.',
        cv:        '<i class="fas fa-file-arrow-down"></i> Unduh CV',
        darkLbl:   'Gelap', lightLbl: 'Terang',
      }
    };

    let lang  = localStorage.getItem('lang')  || 'en';
    let theme = localStorage.getItem('theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

    /* ── Particles ─────────────────────────────────────────
       Original app.js config preserved exactly.
       Only change: color #565656 → #fc7a00 (orange).
       detect_on: 'window' so grab works over the card (z-index fix).
    ──────────────────────────────────────────────────────── */
    function initParticles(t) {
      if (window.pJSDom && window.pJSDom.length) {
        window.pJSDom[0].pJS.fn.vendors.destroypJS();
        window.pJSDom = [];
      }
      document.getElementById('particles-js').innerHTML = '';
      particlesJS('particles-js', {
        particles: {
          number:  { value: 75, density: { enable: true, value_area: 800 } },
          color:   { value: '#fc7a00' },
          shape:   { type: 'circle', stroke: { width: 0, color: '#000000' } },
          opacity: { value: 0.5, random: false,
                     anim: { enable: false, speed: 1, opacity_min: 0.1, sync: false } },
          size:    { value: 6, random: true,
                     anim: { enable: false, speed: 40, size_min: 0.1, sync: false } },
          line_linked: {
            enable: true, distance: 150, color: '#fc7a00', opacity: 0.4, width: 2.5
          },
          move: {
            enable: true, speed: 3, direction: 'none',
            random: false, straight: false, out_mode: 'out', bounce: false,
            attract: { enable: false, rotateX: 600, rotateY: 1200 }
          }
        },
        interactivity: {
          detect_on: 'window',
          events: {
            onhover: { enable: true, mode: 'grab' },
            onclick: { enable: true, mode: 'push' },
            resize:  true
          },
          modes: {
            grab:    { distance: 150, line_linked: { opacity: 1 } },
            bubble:  { distance: 400, size: 40, duration: 2, opacity: 8, speed: 3 },
            repulse: { distance: 200, duration: 0.4 },
            push:    { particles_nb: 4 },
            remove:  { particles_nb: 2 }
          }
        },
        retina_detect: true
      });
    }

    /* ── Theme ───────────────────────────────────────────── */
    function applyTheme(t) {
      theme = t;
      localStorage.setItem('theme', t);
      document.body.setAttribute('data-theme', t);
      const dark = t === 'dark';
      document.getElementById('themeIcon').className = dark ? 'fas fa-sun' : 'fas fa-moon';
      document.getElementById('themeLabel').textContent = dark ? i18n[lang].lightLbl : i18n[lang].darkLbl;
      initParticles(t);
    }

    /* ── Language ────────────────────────────────────────── */
    function applyLang(l) {
      lang = l;
      localStorage.setItem('lang', l);
      document.documentElement.lang = l === 'id' ? 'id' : 'en';
      const t = i18n[l];

      document.getElementById('langLabel').textContent = l === 'en' ? 'ID' : 'EN';

      document.querySelectorAll('[data-i18n]').forEach(el => {
        if (t[el.dataset.i18n] !== undefined) el.textContent = t[el.dataset.i18n];
      });
      document.querySelectorAll('[data-i18n-html]').forEach(el => {
        if (t[el.dataset.i18nHtml] !== undefined) el.innerHTML = t[el.dataset.i18nHtml];
      });

      const dark = theme === 'dark';
      document.getElementById('themeLabel').textContent = dark ? t.lightLbl : t.darkLbl;
      restartTypewriter(t.roles);
    }

    /* ── Typewriter ──────────────────────────────────────── */
    let twTimer, twRoles = [], ri = 0, ci = 0, deleting = false, wait = 0;
    const twEl = document.querySelector('.typewriter');

    function restartTypewriter(roles) {
      clearTimeout(twTimer);
      twRoles = roles; ri = 0; ci = 0; deleting = false; wait = 0;
      twEl.textContent = '';
      twTimer = setTimeout(tick, 320);
    }

    function tick() {
      const cur = twRoles[ri];
      if (wait > 0) { wait--; twTimer = setTimeout(tick, 80); return; }
      if (!deleting) {
        twEl.textContent = cur.slice(0, ++ci);
        if (ci === cur.length) { deleting = true; wait = 26; }
      } else {
        twEl.textContent = cur.slice(0, --ci);
        if (ci === 0) { deleting = false; ri = (ri + 1) % twRoles.length; wait = 4; }
      }
      twTimer = setTimeout(tick, deleting ? 36 : 68);
    }

    /* ── Toggles ─────────────────────────────────────────── */
    document.getElementById('themeBtn').addEventListener('click', () =>
      applyTheme(theme === 'dark' ? 'light' : 'dark'));
    document.getElementById('langBtn').addEventListener('click', () =>
      applyLang(lang === 'en' ? 'id' : 'en'));

    /* ── Boot ────────────────────────────────────────────── */
    applyTheme(theme);
    setTimeout(() => applyLang(lang), 80);
  </script>
